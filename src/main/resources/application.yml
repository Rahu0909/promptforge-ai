spring:
  application:
    name: promptforge-backend

  profiles:
    active: local

server:

  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    path: logs

  level:
    root: INFO
    com.rahulagarwal.promptforge: DEBUG
    org.springframework: INFO
    org.hibernate: WARN